OPENAI_MODEL = "gpt-5"
# Comma-separated allowed frontend origins. Add your GitHub Pages domain before production.
ALLOWED_ORIGINS = "https://quandd31112.github.io,http://localhost:3000,http://127.0.0.1:3000,http://localhost:8000,http://127.0.0.1:8000"
